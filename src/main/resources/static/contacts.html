<!DOCTYPE html>
<html>
<head>
    <title>All Contacts</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h2>All Contacts</h2>

        <table id="contactTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>

        <br>
        <a href="/"> Back to Contact Form</a>
    </div>

    <script>
        fetch("/contacts")
            .then(res => res.json())
            .then(data => {
                let tbody = document.getElementById("tableBody");
                data.forEach((c, index) => {
                    let row = `<tr>
                        <td>${index + 1}</td>
                        <td>${c.name}</td>
                        <td>${c.email}</td>
                        <td>${c.message}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });
    </script>
</body>
</html>
